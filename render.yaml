# render.yaml — Render Deployment Configuration
# ================================================
# This file tells Render exactly how to deploy the app.
# Render reads this automatically when you connect your GitHub repo.
#
# Free tier notes:
#   - Web service spins down after 15 mins of inactivity
#   - First request after spin-down takes ~30 seconds (cold start)
#   - This is fine for a portfolio project

services:
  - type: web
    name: ai-rca-assistant
    runtime: python
    region: oregon          # Free tier region
    plan: free

    # Where to find the app
    rootDir: backend        # All Python code is in /backend

    # How to install dependencies
    buildCommand: pip install -r requirements.txt

    # How to start the app
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

    # Health check — Render pings this to know if app is alive
    healthCheckPath: /health

    # Environment variables
    # IMPORTANT: Set these in Render dashboard — NOT here
    # (never put real API keys in this file)
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"

      - key: LLM_PROVIDER
        value: groq           # Change to openai or azure if needed

      - key: GROQ_API_KEY
        sync: false           # Render will ask you to enter this

      - key: OPENAI_API_KEY
        sync: false           # Optional — only if using OpenAI

      - key: DATABASE_URL
        sync: false           # Your Supabase PostgreSQL URL

      - key: EMBEDDING_PROVIDER
        value: huggingface    # Free, runs locally

      - key: EMBEDDING_MODEL
        value: all-MiniLM-L6-v2

      - key: CHROMA_PERSIST_PATH
        value: /tmp/chroma    # Render's ephemeral storage (resets on restart)
                              # For persistent KB, use ChromaDB Cloud later

      - key: DEBUG
        value: "false"        # Always false in production

      - key: APP_NAME
        value: "AI RCA Assistant"

      - key: APP_VERSION
        value: "1.0.0"
